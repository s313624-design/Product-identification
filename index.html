<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <title>商品即時辨識</title>
  <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@latest/dist/tf.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@teachablemachine/image@latest/dist/teachablemachine-image.min.js"></script>
  <style>
    body {
      font-family: "Microsoft JhengHei", sans-serif;
      text-align: center;
      background: #f5f5f5;
      margin: 0;
      padding: 20px;
    }

    .container {
      max-width: 900px;
      margin: auto;
      background: white;
      border-radius: 20px;
      padding: 24px;
      box-shadow: 0 4px 14px rgba(0,0,0,0.12);
    }

    h1 {
      margin-bottom: 8px;
    }

    .status {
      margin: 10px 0 20px;
      color: #666;
      font-size: 16px;
    }

    #webcam-container canvas {
      border-radius: 16px;
      border: 1px solid #ddd;
      max-width: 100%;
    }

    .result-box {
      margin-top: 24px;
      padding: 16px;
      background: #f9fbff;
      border-radius: 16px;
    }

    .final-result {
      font-size: 28px;
      font-weight: bold;
      color: #1565c0;
      margin-bottom: 12px;
    }

    .probability {
      font-size: 18px;
      line-height: 1.9;
      text-align: left;
      display: inline-block;
    }

    .tip {
      margin-top: 18px;
      color: #777;
      font-size: 15px;
    }

    button {
      font-size: 16px;
      padding: 10px 18px;
      border: none;
      border-radius: 10px;
      background: #1565c0;
      color: white;
      cursor: pointer;
      margin-top: 12px;
    }

    button:hover {
      background: #0d47a1;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>即時辨識系統</h1>
    <div class="status" id="status">模型與鏡頭初始化中...</div>

    <div id="webcam-container"></div>

    <div class="result-box">
      <div class="final-result" id="final-result">等待辨識中...</div>
      <div class="probability" id="label-container"></div>
    </div>

    <button onclick="init()">重新啟動鏡頭</button>

    <div class="tip">
      將物品放到鏡頭前，系統會自動即時辨識。
    </div>
  </div>

  <script>
    const MODEL_BASE = "https://teachablemachine.withgoogle.com/models/7VIVrDbmO/";
    const modelURL = MODEL_BASE + "model.json";
    const metadataURL = MODEL_BASE + "metadata.json";

    let model, webcam, maxPredictions;
    let isRunning = false;

    async function init() {
      try {
        document.getElementById("status").innerText = "正在載入模型...";
        document.getElementById("webcam-container").innerHTML = "";
        document.getElementById("label-container").innerHTML = "";
        document.getElementById("final-result").innerText = "等待辨識中...";

        model = await tmImage.load(modelURL, metadataURL);
        maxPredictions = model.getTotalClasses();

        // 建議使用接近正方形，符合 Teachable Machine 影像訓練習慣
        const flip = true;
        webcam = new tmImage.Webcam(300, 300, flip);

        document.getElementById("status").innerText = "請允許使用鏡頭...";
        await webcam.setup();   // 會跳出鏡頭權限要求
        await webcam.play();

        document.getElementById("webcam-container").appendChild(webcam.canvas);
        document.getElementById("status").innerText = "鏡頭已啟動，正在即時辨識。";

        isRunning = true;
        window.requestAnimationFrame(loop);
      } catch (error) {
        console.error(error);
        document.getElementById("status").innerText =
          "無法啟動鏡頭或載入模型，請確認已允許相機權限，且頁面在 HTTPS 環境下開啟。";
      }
    }

    async function loop() {
      if (!isRunning) return;
      webcam.update();
      await predict();
      window.requestAnimationFrame(loop);
    }

    async function predict() {
      const prediction = await model.predict(webcam.canvas);

      prediction.sort((a, b) => b.probability - a.probability);

      let html = "";
      prediction.forEach(item => {
        html += `${item.className}：${(item.probability * 100).toFixed(2)}%<br>`;
      });

      document.getElementById("label-container").innerHTML = html;
      document.getElementById("final-result").innerText =
        `目前物品：${prediction[0].className}`;
    }

    window.addEventListener("load", init);
  </script>
</body>
</html>
