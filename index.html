<!DOCTYPE html>
<html>
<head>
  <title>自動物件偵測與計數</title>
  <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs"></script>
  <script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/coco-ssd"></script>
  <style>
    body { font-family: sans-serif; text-align: center; }
    .container { position: relative; display: inline-block; }
    canvas { position: absolute; left: 0; top: 0; }
    video { border: 1px solid #ccc; border-radius: 10px; }
    #result { font-size: 24px; font-weight: bold; color: #1565c0; margin-top: 20px; }
  </style>
</head>
<body>
  <h1>即時物件計數系統 (預訓練模型)</h1>
  <div class="container">
    <video id="video" width="640" height="480" autoplay muted></video>
    <canvas id="canvas" width="640" height="480"></canvas>
  </div>
  <div id="result">正在啟動鏡頭...</div>

  <script>
    const video = document.getElementById('video');
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    const resultDiv = document.getElementById('result');

    async function setupCamera() {
      const stream = await navigator.mediaDevices.getUserMedia({ video: true });
      video.srcObject = stream;
      return new Promise(resolve => video.onloadedmetadata = () => resolve());
    }

    async function detect() {
      const model = await cocoSsd.load();
      resultDiv.innerText = "模型載入成功，開始辨識...";
      
      setInterval(async () => {
        const predictions = await model.detect(video);
        
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        const counts = {};

        predictions.forEach(prediction => {
          // 畫框
          ctx.strokeStyle = "#00FF00";
          ctx.lineWidth = 4;
          ctx.strokeRect(...prediction.bbox);

          // 畫文字
          ctx.fillStyle = "#00FF00";
          ctx.font = "18px Arial";
          ctx.fillText(prediction.class, prediction.bbox[0], prediction.bbox[1] > 20 ? prediction.bbox[1] - 5 : 20);

          // 計數
          counts[prediction.class] = (counts[prediction.class] || 0) + 1;
        });

        // 顯示結果 (例如: bottle-2)
        const summary = Object.keys(counts).map(key => `${key}-${counts[key]}`).join(' 、 ');
        resultDiv.innerText = summary || "未偵測到物品";
      }, 200);
    }

    setupCamera().then(detect);
  </script>
</body>
</html>
